<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout - JP STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
padding:25px;
}

.checkout{
max-width:800px;
margin:auto;
background:#0d0d0d;
padding:35px;
border-radius:30px;
}

h1{
font-size:45px;
margin-bottom:20px;
}

p{
color:#aaa;
line-height:1.8;
margin-bottom:20px;
}

.total{
background:#111;
padding:20px;
border-radius:18px;
margin-bottom:20px;
font-size:22px;
font-weight:700;
}

.pix{
background:#111;
padding:20px;
border-radius:18px;
margin-bottom:20px;
word-break:break-all;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#7c3aed,#9333ea);
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
margin-bottom:15px;
}

.discord{
display:block;
text-align:center;
padding:18px;
border-radius:18px;
background:#5865F2;
text-decoration:none;
color:white;
font-size:18px;
font-weight:700;
}

</style>

</head>

<body>

<div class="checkout">

<h1>
Checkout
</h1>

<p>

1. Copie a chave PIX abaixo.<br><br>

2. Abra o aplicativo do seu banco.<br><br>

3. Cole a chave PIX.<br><br>

4. Digite o valor total do pedido.<br><br>

5. Após pagar envie o comprovante no Discord da JP STORE.

</p>

<div class="total" id="total">
Total: R$0
</div>

<div class="pix">
24 98161-3211
</div>

<button onclick="copyPix()">
Copiar Chave PIX
</button>

<a href="#" class="discord">
Enviar comprovante no Discord
</a>

</div>

<script>

const total = localStorage.getItem('cartTotal') || 0

document.getElementById('total').innerText =
'Total: R$'+total

function copyPix(){

navigator.clipboard.writeText('24 98161-3211')

alert('PIX copiado')

}

</script>

</body>
</html>
