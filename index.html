<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP STORE - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
color:white;
}

.login-box{
width:100%;
max-width:420px;
background:#0d0d0d;
padding:35px;
border-radius:25px;
border:1px solid rgba(255,255,255,.05);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:90px;
height:90px;
border-radius:20px;
object-fit:cover;
box-shadow:0 0 25px #9333ea;
}

h1{
text-align:center;
font-size:35px;
margin-bottom:10px;
}

p{
text-align:center;
color:#aaa;
margin-bottom:25px;
}

input{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:#111;
color:white;
font-size:15px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#7c3aed,#9333ea);
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
<img src="logo.png">
</div>

<h1>JP STORE</h1>

<p>
Entre ou registre sua conta.
</p>

<input type="text" placeholder="Usuário">

<input type="email" placeholder="Gmail">

<input type="password" placeholder="Senha">

<button onclick="window.location.href='home.html'">
Entrar
</button>

</div>

</body>
</html>
