<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrinho - JP STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
padding:20px;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.cart-box{
width:100%;
max-width:700px;
background:#0d0d0d;
border:1px solid rgba(147,51,234,.2);
border-radius:30px;
padding:30px;
}

/* LOGO */

.logo{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
margin-bottom:35px;
text-align:center;
}

.logo img{
width:95px;
height:95px;
border-radius:24px;
object-fit:cover;
margin-bottom:12px;
}

.logo h1{
font-size:42px;
font-weight:800;
}

/* TITULO */

.title{
text-align:center;
margin-bottom:30px;
}

.title h2{
font-size:38px;
margin-bottom:8px;
}

.title p{
color:#999;
font-size:16px;
}

/* PRODUTO */

.product{
background:#111;
border-radius:24px;
padding:22px;
margin-bottom:25px;
}

.product-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.product-name{
font-size:24px;
font-weight:700;
}

.product-price{
font-size:24px;
font-weight:800;
color:#a855f7;
}

/* CONTROLES */

.controls{
display:flex;
align-items:center;
justify-content:center;
gap:18px;
margin-top:10px;
}

.controls button{
width:50px;
height:50px;
border:none;
border-radius:16px;
background:#9333ea;
color:white;
font-size:26px;
font-weight:800;
cursor:pointer;
transition:.2s;
}

.controls button:hover{
transform:scale(1.05);
}

.qty{
font-size:26px;
font-weight:700;
min-width:35px;
text-align:center;
}

/* TOTAL */

.total-box{
background:#111;
padding:20px;
border-radius:22px;
margin-bottom:25px;
text-align:center;
}

.total-label{
font-size:17px;
color:#aaa;
margin-bottom:8px;
}

.total{
font-size:42px;
font-weight:800;
color:#a855f7;
}

/* CUPOM */

.coupon-area{
margin-top:20px;
}

.coupon-area input{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#111;
color:white;
font-size:16px;
outline:none;
margin-bottom:14px;
}

.apply-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#22c55e;
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

.apply-btn:hover{
transform:scale(1.01);
}

/* CONTINUAR */

.checkout-btn{
width:100%;
padding:20px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#7c3aed,#9333ea);
color:white;
font-size:20px;
font-weight:800;
cursor:pointer;
margin-top:25px;
transition:.2s;
}

.checkout-btn:hover{
transform:scale(1.02);
}

/* ALERTA */

.secure{
margin-top:22px;
text-align:center;
color:#888;
font-size:14px;
line-height:1.7;
}

/* MOBILE */

@media(max-width:768px){

.cart-box{
padding:22px;
}

.logo h1{
font-size:34px;
}

.title h2{
font-size:30px;
}

.product-name{
font-size:21px;
}

.product-price{
font-size:21px;
}

.total{
font-size:34px;
}

}

</style>

</head>

<body>

<div class="cart-box">

<!-- LOGO -->

<div class="logo">

<img src="logo.png">

<h1>JP STORE</h1>

</div>

<!-- TITULO -->

<div class="title">

<h2>
🛒 Seu Carrinho
</h2>

<p>
Confira seu pedido antes de continuar
</p>

</div>

<!-- PRODUTO -->

<div class="product">

<div class="product-top">

<div class="product-name" id="productName">
Produto
</div>

<div class="product-price" id="unitPrice">
R$0
</div>

</div>

<div class="controls">

<button onclick="minus()">
-
</button>

<div class="qty" id="qty">
1
</div>

<button onclick="plus()">
+
</button>

</div>

</div>

<!-- TOTAL -->

<div class="total-box">

<div class="total-label">
Valor total
</div>

<div class="total" id="total">
R$0
</div>

</div>

<!-- CUPOM -->

<div class="coupon-area">

<input
type="text"
id="coupon"
placeholder="Digite seu cupom"
>

<button class="apply-btn" onclick="applyCoupon()">
Aplicar Cupom
</button>

</div>

<!-- CONTINUAR -->

<button class="checkout-btn" onclick="goCheckout()">
Continuar para pagamento
</button>

<!-- AVISO -->

<div class="secure">
🔒 Ambiente protegido • Checkout seguro • Sistema monitorado
</div>

</div>

<script>

let productName =
localStorage.getItem('cartName')

let productPrice =
Number(localStorage.getItem('cartPrice'))

let qty = 1

let discount = 0

document.getElementById('productName')
.innerText = productName

document.getElementById('unitPrice')
.innerText = 'R$' + productPrice

function render(){

document.getElementById('qty')
.innerText = qty

let total =
productPrice * qty

if(discount > 0){

total =
total - (total * discount / 100)

}

document.getElementById('total')
.innerText =
'R$' + total.toFixed(2)

}

function plus(){

qty++

render()

}

function minus(){

if(qty > 1){

qty--

render()

}

}

function applyCoupon(){

const coupon =
document.getElementById('coupon')
.value
.trim()
.toUpperCase()

const endDate =
localStorage.getItem('couponEndDate')

const now =
new Date().getTime()

if(now >= endDate){

alert('Cupom expirado')

return

}

if(coupon === 'TRICKI1'){

discount = 20

render()

alert('20% OFF aplicado')

}else{

alert('Cupom inválido')

}

}

function goCheckout(){

let total =
productPrice * qty

if(discount > 0){

total =
total - (total * discount / 100)

}

localStorage.setItem(
'cartTotal',
total.toFixed(2)
)

window.location.href='checkout.html'

}

render()

</script>

</body>
</html>
