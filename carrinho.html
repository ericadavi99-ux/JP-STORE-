<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Carrinho - JP STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
padding:22px;
}

.cart{
max-width:700px;
margin:auto;
background:#0b0b0b;
padding:30px;
border-radius:35px;
border:1px solid rgba(255,255,255,.05);
}

.title{
text-align:center;
margin-bottom:30px;
}

.title h1{
font-size:40px;
font-weight:800;
margin-bottom:10px;
}

.items{
margin-bottom:25px;
}

.item{
background:#090909;
padding:20px;
border-radius:24px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
}

.item-left{
display:flex;
flex-direction:column;
gap:8px;
}

.item-name{
font-size:20px;
font-weight:700;
}

.item-price{
font-size:16px;
color:#aaa;
}

.item-robux{
font-size:15px;
color:#a855f7;
font-weight:700;
}

.quantity-box{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.qty-btn{
width:38px;
height:38px;
border:none;
border-radius:14px;
background:#111;
color:white;
font-size:22px;
font-weight:800;
cursor:pointer;
}

.qty-number{
min-width:30px;
text-align:center;
font-size:18px;
font-weight:700;
}

.remove-btn{
border:none;
padding:12px 18px;
border-radius:16px;
background:#1a1a1a;
color:white;
font-weight:700;
cursor:pointer;
}

.total-box{
margin-top:30px;
background:#090909;
padding:25px;
border-radius:28px;
}

.total-box h2{
font-size:32px;
margin-bottom:20px;
}

.total-info{
font-size:20px;
line-height:2;
}

.total-info span{
color:#a855f7;
font-weight:800;
}

.checkout-btn{
width:100%;
margin-top:25px;
padding:20px;
border:none;
border-radius:22px;
background:
linear-gradient(
90deg,
#7c3aed,
#9333ea
);
color:white;
font-size:20px;
font-weight:800;
cursor:pointer;
}

</style>

</head>

<body>

<div class="cart">

<div class="title">

<h1>
🛒 Carrinho
</h1>

</div>

<div class="items" id="items">
</div>

<div class="total-box">

<h2>
Resumo
</h2>

<div class="total-info">

Produtos:
<span id="totalItems">0</span>

<br>

Total:
<span id="totalPrice">R$0</span>

<br>

Robux:
<span id="totalRobux">0 Robux</span>

</div>

</div>

<button
class="checkout-btn"
onclick="goCheckout()"
>
Finalizar Compra
</button>

</div>

<script>

let cart =
JSON.parse(
localStorage.getItem('cartItems')
) || []

const itemsContainer =
document.getElementById('items')

function renderCart(){

itemsContainer.innerHTML=''

let totalPrice = 0
let totalRobux = 0
let totalItems = 0

cart.forEach((item,index)=>{

totalPrice +=
item.price * item.quantity

totalItems +=
item.quantity

if(item.robux > 0){

totalRobux +=
item.robux * item.quantity

}

itemsContainer.innerHTML += `

<div class="item">

<div class="item-left">

<div class="item-name">
${item.name}
</div>

<div class="item-price">
R$${(item.price * item.quantity).toFixed(2)}
</div>

${
item.robux > 0
?

`<div class="item-robux">
${item.robux * item.quantity} Robux
</div>`

:

''

}

<div class="quantity-box">

<button
class="qty-btn"
onclick="decreaseQty(${index})"
>
-
</button>

<div class="qty-number">
${item.quantity}
</div>

<button
class="qty-btn"
onclick="increaseQty(${index})"
>
+
</button>

</div>

</div>

<button
class="remove-btn"
onclick="removeItem(${index})"
>
Remover
</button>

</div>

`

})

document.getElementById('totalItems')
.innerHTML =
totalItems

document.getElementById('totalPrice')
.innerHTML =
'R$' + totalPrice.toFixed(2)

document.getElementById('totalRobux')
.innerHTML =
totalRobux + ' Robux'

localStorage.setItem(
'cartItems',
JSON.stringify(cart)
)

}

function increaseQty(index){

cart[index].quantity++

renderCart()

}

function decreaseQty(index){

if(cart[index].quantity > 1){

cart[index].quantity--

renderCart()

}

}

function removeItem(index){

cart.splice(index,1)

renderCart()

}

function goCheckout(){

window.location.href =
'checkout.html'

}

renderCart()

</script>

</body>
</html>
