<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feedbacks - JP STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
padding:30px;
}

.title{
text-align:center;
margin-bottom:40px;
}

.box{
max-width:700px;
margin:auto;
background:#0d0d0d;
padding:30px;
border-radius:25px;
}

input,textarea{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:#111;
color:white;
}

textarea{
height:140px;
resize:none;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#7c3aed,#9333ea);
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
}

</style>

</head>

<body>

<div class="title">
<h1>Feedbacks</h1>
</div>

<div class="box">

<input type="text" placeholder="Seu usuário">

<input type="text" placeholder="ID do pedido">

<textarea placeholder="Digite seu feedback"></textarea>

<button>
Enviar Feedback
</button>

</div>

</body>
</html>
