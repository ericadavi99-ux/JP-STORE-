<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no"
>

<title>
Produtos - JP STORE
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{
background:#050505;
color:white;
padding:22px;
overflow-x:hidden;
animation:fadePage .7s ease;
}

/* ANIMAÇÃO */

@keyframes fadePage{

from{
opacity:0;
transform:translateY(12px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes softUp{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes wave{

0%{
transform:translateY(0);
opacity:.3;
}

50%{
transform:translateY(-5px);
opacity:1;
}

100%{
transform:translateY(0);
opacity:.3;
}

}

@keyframes floatIn{

from{
opacity:0;
transform:scale(.7);
}

to{
opacity:1;
transform:scale(1);
}

}

/* LOGO */

.logo{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
margin-bottom:35px;
text-align:center;
animation:softUp .7s ease;
}

.logo img{
width:120px;
height:120px;
border-radius:28px;
object-fit:cover;
margin-bottom:15px;
box-shadow:
0 0 35px rgba(147,51,234,.35);
transition:.35s;
}

.logo img:hover{
transform:scale(1.04);
}

.logo h1{
font-size:42px;
font-weight:800;
}

/* CATEGORIA */

.category{
background:#0b0b0b;
border-radius:34px;
padding:25px;
margin-bottom:30px;
border:1px solid rgba(255,255,255,.04);
animation:softUp .7s ease;
transition:.3s;
}

.category:hover{
transform:translateY(-2px);
border:1px solid rgba(147,51,234,.20);
}

.category img{
width:90px;
height:90px;
object-fit:contain;
margin-bottom:20px;
transition:.35s;
}

.category img:hover{
transform:scale(1.05);
}

.category h2{
font-size:40px;
margin-bottom:25px;
font-weight:800;
}

/* ITEM */

.item{
background:#090909;
padding:20px;
border-radius:24px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
gap:15px;
border:1px solid rgba(255,255,255,.04);
transition:.25s;
animation:softUp .8s ease;
}

.item:hover{
transform:translateY(-3px) scale(1.01);
border:1px solid rgba(147,51,234,.30);
box-shadow:
0 0 20px rgba(147,51,234,.10);
}

.item-name{
font-size:20px;
font-weight:600;
line-height:1.7;
}

/* BOTÃO */

.buy-btn{
border:none;
padding:17px 28px;
border-radius:20px;
background:
linear-gradient(
90deg,
#7c3aed,
#9333ea
);
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
min-width:145px;
transition:.25s;
box-shadow:
0 0 15px rgba(147,51,234,.15);
}

.buy-btn:hover{
transform:scale(1.04);
box-shadow:
0 0 25px rgba(147,51,234,.35);
}

.buy-btn:active{
transform:scale(.95);
}

/* LOADING */

.loading{
display:flex;
align-items:center;
justify-content:center;
gap:5px;
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:wave 1s infinite;
}

.dot:nth-child(2){
animation-delay:.15s;
}

.dot:nth-child(3){
animation-delay:.3s;
}

/* BOTÃO FLUTUANTE */

.floating-cart{
display:none;
position:fixed;
bottom:20px;
right:20px;
width:78px;
height:78px;
border:none;
border-radius:50%;
background:
linear-gradient(
90deg,
#7c3aed,
#9333ea
);
color:white;
font-size:30px;
font-weight:800;
cursor:pointer;
z-index:9999;
box-shadow:
0 0 30px rgba(147,51,234,.40);
transition:.25s;
animation:floatIn .5s ease;
}

.floating-cart:hover{
transform:scale(1.08);
box-shadow:
0 0 35px rgba(147,51,234,.55);
}

.floating-cart:active{
transform:scale(.94);
}

/* MOBILE */

@media(max-width:768px){

.logo h1{
font-size:34px;
}

.category h2{
font-size:32px;
}

.item{
flex-direction:column;
align-items:flex-start;
}

.buy-btn{
width:100%;
}

}

</style>

</head>

<body>

<!-- SOM CLIQUE -->

<audio id="clickSound" preload="auto">
<source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8630b1cfd.mp3?filename=mouse-click-117076.mp3" type="audio/mpeg">
</audio>

<!-- SOM POP -->

<audio id="popSound" preload="auto">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c551879b2.mp3?filename=interface-click-124467.mp3" type="audio/mpeg">
</audio>

<!-- LOGO -->

<div class="logo">

<img
src="logo.png"
alt="Logo JP STORE"
>

<h1>
JP STORE
</h1>

</div>

<!-- ROBUX -->

<div class="category">

<img
src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.jpg"
>

<h2>
Robux
</h2>

<div class="item">

<div class="item-name">
100 Robux — R$3,60
</div>

<button
class="buy-btn"
onclick="buy(this,'100 Robux',3.60,100)"
>
Adquirir
</button>

</div>

<div class="item">

<div class="item-name">
400 Robux — R$10
</div>

<button
class="buy-btn"
onclick="buy(this,'400 Robux',10,400)"
>
Adquirir
</button>

</div>

<div class="item">

<div class="item-name">
800 Robux — R$19
</div>

<button
class="buy-btn"
onclick="buy(this,'800 Robux',19,800)"
>
Adquirir
</button>

</div>

</div>

<!-- YOUTUBE -->

<div class="category">

<img
src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg"
>

<h2>
YouTube Premium
</h2>

<div class="item">

<div class="item-name">
2 Meses — R$15
</div>

<button
class="buy-btn"
onclick="buy(this,'YouTube Premium 2 Meses',15,0)"
>
Adquirir
</button>

</div>

<div class="item">

<div class="item-name">
3 Meses — R$20
</div>

<button
class="buy-btn"
onclick="buy(this,'YouTube Premium 3 Meses',20,0)"
>
Adquirir
</button>

</div>

</div>

<!-- SPOTIFY -->

<div class="category">

<img
src="https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg"
>

<h2>
Spotify Premium
</h2>

<div class="item">

<div class="item-name">
1 Mês — R$8
</div>

<button
class="buy-btn"
onclick="buy(this,'Spotify Premium 1 Mês',8,0)"
>
Adquirir
</button>

</div>

<div class="item">

<div class="item-name">
3 Meses — R$18
</div>

<button
class="buy-btn"
onclick="buy(this,'Spotify Premium 3 Meses',18,0)"
>
Adquirir
</button>

</div>

</div>

<!-- BOTÃO ABRIR CARRINHO -->

<button
id="floatingCart"
class="floating-cart"
onclick="openSavedCart()"
>
🛒
</button>

<script>

/* =========================
ANTI BUG
========================= */

document.addEventListener(
'contextmenu',
e => e.preventDefault()
)

document.addEventListener(
'keydown',
function(e){

if(e.key === 'F12'){
e.preventDefault()
}

if(e.ctrlKey && e.shiftKey && e.key === 'I'){
e.preventDefault()
}

if(e.ctrlKey && e.shiftKey && e.key === 'J'){
e.preventDefault()
}

if(e.ctrlKey && e.key === 'u'){
e.preventDefault()
}

})

/* =========================
SONS
========================= */

function playClick(){

const sound =
document.getElementById('clickSound')

sound.currentTime = 0

sound.play()

}

function playPop(){

const sound =
document.getElementById('popSound')

sound.currentTime = 0

sound.play()

}

/* =========================
COMPRAR
========================= */

function buy(button,name,price,robux){

playClick()

button.style.transform='scale(.95)'

button.innerHTML = `

<div class="loading">

Carregando

<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>

</div>

`

button.disabled = true

let cart =

JSON.parse(
localStorage.getItem('cartItems')
) || []

const existingItem =
cart.find(
item => item.name === name
)

if(existingItem){

existingItem.quantity += 1

}else{

cart.push({

name:name,
price:price,
robux:robux,
quantity:1

})

}

localStorage.setItem(
'cartItems',
JSON.stringify(cart)
)

/* REMOVE BOTÃO FLUTUANTE */

localStorage.removeItem(
'cartSaved'
)

setTimeout(()=>{

playPop()

window.location.href =
'carrinho.html'

},1500)

}

/* =========================
MOSTRAR BOTÃO
SÓ SE SALVOU O CARRINHO
========================= */

if(
localStorage.getItem('cartSaved')
=== 'true'
){

document
.getElementById('floatingCart')
.style.display='block'

}

/* =========================
ABRIR CARRINHO
========================= */

function openSavedCart(){

playClick()

localStorage.removeItem(
'cartSaved'
)

window.location.href =
'carrinho.html'

}

</script>

</body>
</html>
