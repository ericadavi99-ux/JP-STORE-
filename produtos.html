<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Produtos - JP STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#050505;
color:white;
padding:22px;
overflow-x:hidden;
}

.logo{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
margin-bottom:30px;
text-align:center;
}

.logo img{
width:120px;
height:120px;
border-radius:28px;
object-fit:cover;
margin-bottom:15px;
box-shadow:
0 0 30px rgba(147,51,234,.35);
}

.logo h1{
font-size:42px;
font-weight:800;
}

.category{
background:#0b0b0b;
border-radius:34px;
padding:25px;
margin-bottom:30px;
border:1px solid rgba(255,255,255,.04);
}

.category img{
width:90px;
height:90px;
object-fit:contain;
margin-bottom:20px;
}

.category h2{
font-size:40px;
margin-bottom:25px;
font-weight:800;
}

.item{
background:#090909;
padding:18px;
border-radius:24px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
gap:15px;
}

.item-name{
font-size:19px;
font-weight:500;
}

.buy-btn{
border:none;
padding:16px 26px;
border-radius:20px;
background:
linear-gradient(
90deg,
#7c3aed,
#9333ea
);
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
min-width:140px;
transition:.25s;
}

.buy-btn:hover{
transform:scale(1.03);
box-shadow:
0 0 20px rgba(147,51,234,.25);
}

/* LOADING */

.loading{
display:flex;
align-items:center;
justify-content:center;
gap:4px;
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:blink 1s infinite;
}

.dot:nth-child(2){
animation-delay:.2s;
}

.dot:nth-child(3){
animation-delay:.4s;
}

@keyframes blink{

0%{
opacity:.2;
transform:translateY(0);
}

50%{
opacity:1;
transform:translateY(-4px);
}

100%{
opacity:.2;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:768px){

.logo h1{
font-size:34px;
}

.category h2{
font-size:32px;
}

.item{
flex-direction:column;
align-items:flex-start;
}

.buy-btn{
width:100%;
}

}

</style>

</head>

<body>

<!-- LOGO -->

<div class="logo">

<img src="logo.png">

<h1>
JP STORE
</h1>

</div>

<!-- ROBUX -->

<div class="category">

<img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.jpg">

<h2>
Robux
</h2>

<div class="item">

<div class="item-name">
100 Robux — R$3,60
</div>

<button
class="buy-btn"
onclick="buy(this,'100 Robux',3.60,100)"
>
Adquirir
</button>

</div>

<div class="item">

<div class="item-name">
400 Robux — R$10
</div>

<button
class="buy-btn"
onclick="buy(this,'400 Robux',10,400)"
>
Adquirir
</button>

</div>

<div class="item">

<div class="item-name">
800 Robux — R$20
</div>

<button
class="buy-btn"
onclick="buy(this,'800 Robux',20,800)"
>
Adquirir
</button>

</div>

</div>

<!-- YOUTUBE -->

<div class="category">

<img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">

<h2>
YouTube Premium
</h2>

<div class="item">

<div class="item-name">
2 Meses — R$15
</div>

<button
class="buy-btn"
onclick="buy(this,'YouTube Premium 2 Meses',15,0)"
>
Adquirir
</button>

</div>

<div class="item">

<div class="item-name">
3 Meses — R$20
</div>

<button
class="buy-btn"
onclick="buy(this,'YouTube Premium 3 Meses',20,0)"
>
Adquirir
</button>

</div>

</div>

<!-- SPOTIFY -->

<div class="category">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg">

<h2>
Spotify Premium
</h2>

<div class="item">

<div class="item-name">
1 Mês — R$8
</div>

<button
class="buy-btn"
onclick="buy(this,'Spotify Premium 1 Mês',8,0)"
>
Adquirir
</button>

</div>

<div class="item">

<div class="item-name">
3 Meses — R$18
</div>

<button
class="buy-btn"
onclick="buy(this,'Spotify Premium 3 Meses',18,0)"
>
Adquirir
</button>

</div>

</div>

<script>

function buy(button,name,price,robux){

button.innerHTML = `

<div class="loading">

<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>

</div>

`

button.disabled = true

let cart =
JSON.parse(
localStorage.getItem('cartItems')
) || []

cart.push({

name:name,
price:price,
robux:robux,
quantity:1

})

localStorage.setItem(
'cartItems',
JSON.stringify(cart)
)

setTimeout(()=>{

window.location.href='carrinho.html'

},1500)

}

</script>

</body>
</html>
