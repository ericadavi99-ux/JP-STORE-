<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JP STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

header{
width:100%;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
background:#0a0a0a;
position:sticky;
top:0;
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:60px;
height:60px;
border-radius:16px;
object-fit:cover;
background:#111;
}

.logo h1{
font-size:30px;
font-weight:800;
}

.menu{
display:flex;
gap:18px;
}

.menu a{
color:white;
text-decoration:none;
font-weight:600;
font-size:15px;
}

.hero{
padding:90px 20px;
text-align:center;
max-width:900px;
margin:auto;
}

.hero h2{
font-size:65px;
line-height:1.05;
font-weight:800;
margin-bottom:20px;
}

.hero h2 span{
background:linear-gradient(90deg,#a855f7,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
font-size:22px;
line-height:1.8;
color:#aaa;
max-width:700px;
margin:auto;
}

.buy-btn{
display:inline-block;
margin-top:45px;
padding:22px 50px;
border-radius:22px;
background:linear-gradient(90deg,#7c3aed,#9333ea);
color:white;
text-decoration:none;
font-size:22px;
font-weight:700;
}

@media(max-width:768px){

header{
flex-direction:column;
gap:15px;
}

.hero h2{
font-size:52px;
}

.hero p{
font-size:18px;
}

.menu{
flex-wrap:wrap;
justify-content:center;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="logo.png">
<h1>JP STORE</h1>
</div>

<div class="menu">
<a href="home.html">Início</a>
<a href="produtos.html">Produtos</a>
<a href="feedbacks.html">Feedbacks</a>
</div>

</header>

<section class="hero">

<h2>
Assinaturas digitais
<span>oficiais</span>
</h2>

<p>
Robux, YouTube Premium e Spotify Premium com entrega rápida, segurança e suporte completo.
</p>

<a href="produtos.html" class="buy-btn">
Comprar Agora
</a>

</section>

</body>
</html>
